<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-wrap">
        <header class="top-bar">
            <h1>Expense Manager</h1>
            <p class="tagline">Track your daily expenses</p>
        </header>

        <div class="main-panel">
            <div class="summary-grid">
                <div class="summary-card balance-panel">
                    <h3>Available Balance</h3>
                    <p class="summary-value" id="balanceValue">Rs 5,000.00</p>
                </div>
                <div class="summary-card spent-panel">
                    <h3>Total Expenditure</h3>
                    <p class="summary-value" id="spentValue">Rs 0.00</p>
                </div>
            </div>

            <div class="balance-tools">
                <h2>Add Balance</h2>
                <div class="balance-row">
                    <input type="number" id="topUpAmount" placeholder="Enter amount" step="0.01" min="0">
                    <button type="button" class="main-btn small-btn" id="topUpBtn">Add Balance</button>
                </div>
            </div>

            <div class="entry-panel">
                <h2>Add New Expense</h2>
                <form id="addExpenseForm">
                    <div class="field-row">
                        <label for="addAmount">Amount (Rs)</label>
                        <input type="number" id="addAmount" placeholder="Enter amount" step="0.01" min="0" required>
                    </div>

                    <div class="field-row">
                        <label for="addCategory">Category</label>
                        <select id="addCategory" required>
                            <option value="">Select a category</option>
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="medicine">Medicine</option>
                            <option value="shopping">Shopping</option>
                            <option value="grocery">Grocery</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="utilities">Utilities</option>
                            <option value="miscellaneous">Miscellaneous</option>
                        </select>
                    </div>

                    <div class="field-row">
                        <label for="addDescription">Description</label>
                        <input type="text" id="addDescription" placeholder="Enter expense description" required>
                    </div>

                    <div class="field-row">
                        <label for="addDate">Date</label>
                        <input type="date" id="addDate" required>
                    </div>

                    <button type="submit" class="main-btn">Add Expense</button>
                </form>
            </div>

            <div class="history-panel">
                <h2>Recent Transactions</h2>
                <div class="history-filter">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="medicine">Medicine</option>
                        <option value="shopping">Shopping</option>
                        <option value="grocery">Grocery</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="utilities">Utilities</option>
                        <option value="miscellaneous">Miscellaneous</option>
                    </select>
                </div>
                <div class="history-list" id="historyList">
                    <p class="empty-text">No transactions yet. Add your first expense!</p>
                </div>
            </div>
        </div>
    </div>

    <div class="popup" id="updatePopup">
        <div class="popup-content">
            <span class="popup-close" id="closePopup">&times;</span>
            <h2>Edit Expense</h2>
            <form id="updateExpenseForm">
                <div class="field-row">
                    <label for="updateAmount">Amount (Rs)</label>
                    <input type="number" id="updateAmount" step="0.01" min="0" required>
                </div>

                <div class="field-row">
                    <label for="updateCategory">Category</label>
                    <select id="updateCategory" required>
                        <option value="">Select a category</option>
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="medicine">Medicine</option>
                        <option value="shopping">Shopping</option>
                        <option value="grocery">Grocery</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="utilities">Utilities</option>
                        <option value="miscellaneous">Miscellaneous</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="updateDescription">Description</label>
                    <input type="text" id="updateDescription" required>
                </div>

                <div class="field-row">
                    <label for="updateDate">Date</label>
                    <input type="date" id="updateDate" required>
                </div>

                <button type="submit" class="main-btn">Update Expense</button>
            </form>
        </div>
    </div>

    <script src="./dist/app.js" type="module"></script>
</body>

</html>
