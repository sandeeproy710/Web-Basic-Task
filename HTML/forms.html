<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <Label for="name">Name :</Label>
        <input type="text" id="name" placeholder="Enter the name" name="name"><br /><br />


        <Label for="no">Phone no. :</Label>
        <input type="tel" id="no" placeholder="Enter the number" name="contact" \><br /><br />


        <Label for="email">Email :</Label>
        <input type="email" id="email" placeholder="Enter the email" name="email" \><br /><br />


        <Label for="Age">Age :</Label>
        <input type="number" id="Age" max="100" min="5" name="age" \><br /><br />


        <Label for="date">Date :</Label>
        <input type="date" id="date" name="date" \><br /><br />



        <p>Gender:</p>
        <Label for="male">Male</Label>
        <input type="radio" id="male" name="gender" value="male" \><br /><br />
        <Label for="female">Female</Label>
        <input type="radio" id="female" name="gender" value="female" \><br /><br />
        <Label for="others">Others</Label>
        <input type="radio" id="others" name="gender" value="others" \><br /><br />


        <Label for="range">Range</Label>
        <input type="range" id="range" name="range" \><br /><br />


        <p>Skills</p>
        <Label for="python">Python</Label>
        <input type="checkbox" id="python" name="skills" value="python" \><br /><br />
        <Label for="c">C++</Label>
        <input type="checkbox" id="c" name="skills" value="c" \><br /><br />
        <Label for="java">Java</Label>
        <input type="checkbox" id="java" checked name="skills" value="java" \><br /><br />

        <select name="extra" id="extra">
            <option value="" hidden disabled selected>Select a subject</option>
            <option value="">JavaScript</option>
            <option value="">Ruby</option>
            <option value="">DevOps</option>
        </select><br><br>

        <label for="feedback">Feedback</label><br>
        <textarea name="" id="feedback"></textarea>
        <button>Sumbit</button>

    </form>
</body>

</html>
